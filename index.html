<!DOCTYPE html>

<meta charset="UTF-8">

<title>قسم الشؤون الإدارية</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0f1115;
    color: #f5f5f5;
    font-family: "Tahoma", "Segoe UI", Arial, sans-serif;
    padding: 40px 16px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin: 0 0 32px;
    color: #ffffff;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .links a {
    display: block;
    background: #1b1e26;
    border: 1px solid #2b2f3a;
    color: #f5f5f5;
    text-decoration: none;
    font-size: 1rem;
    padding: 14px 18px;
    border-radius: 10px;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }

  .links a:hover {
    background: #242832;
    border-color: #3a3f4d;
    transform: translateY(-1px);
  }

  .links a:active {
    transform: translateY(0);
  }

  footer {
    margin-top: 40px;
    font-size: 0.8rem;
    color: #8a8f99;
  }

  @media (max-width: 480px) {
    h1 {
      font-size: 1.35rem;
    }
    .links a {
      font-size: 0.95rem;
      padding: 13px 16px;
    }
  }
</style>
</head>

      <a href="اجازة-تاجر.html">🏪 نموذج إجازة تاجر</a>
      <a href="انتداب.html">🗂️ نموذج إنتداب</a>
      <a href="ابتعاث.html">💼 نموذج إبتعاث</a>
      <a href="كسر-اجازات.html">🔄 نموذج كسر الإجازات والإنتدابات</a>
    </div>
    <footer>الشؤون الإدارية التابعة لقطاع الأمن العام بمقاطعة بوليتو © 2025</footer>
  </div>
</body>
